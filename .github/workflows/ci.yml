name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (SQLite for CI)
        run: npm run db:generate
        env:
          DATABASE_URL: file:./dev.db

      - name: Lint (prettier)
        run: npm run lint

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Typecheck all workspaces
        run: npm run typecheck
        env:
          DATABASE_URL: file:./dev.db

      - name: Unit tests
        run: npm test
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
          INTERNAL_API_KEY: ci-only-internal-ci-only-internal-ci

      - name: Build frontend (PWA)
        run: npm run build -w apps/web

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, auth, market, news, earnings, smart, ai]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/service.Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # Deployment: pushes versioned images to GHCR on tags (vX.Y.Z).
  # Wire the final `deploy` step to your host (SSH/k8s/render) when chosen.
  release:
    name: Publish images (on tag)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [gateway, auth, market, news, earnings, smart, ai, web]
    steps:
      - uses: actions/checkout@v4
      # amd64 + arm64 : les images tournent aussi sur les VM ARM (Oracle A1…)
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service == 'web' && 'web.Dockerfile' || 'service.Dockerfile' }}
          build-args: SERVICE=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/monere-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/monere-${{ matrix.service }}:latest
